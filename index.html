<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cyber Robot Transform</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>CYBER ROBOT SYSTEM</h1>
  <p>Future machines → autonomous transformation units</p>
</header>

<section class="hero">
  <h2>ENTER THE CYBER WORLD</h2>
  <p>Machines are evolving into intelligent robots</p>
  <button onclick="scrollToSection()">EXPLORE UNITS</button>
</section>

<section id="models">
  <h2>TRANSFORMATION UNITS</h2>

  <div class="grid">

    <div class="card">
      <img src="https://via.placeholder.com/300x200.png?text=CYBER+TRUCK+UNIT">
      <h3>CYBER TRUCK UNIT</h3>
      <button onclick="transform(this)">ACTIVATE</button>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/300x200.png?text=SPEED+DRONE+UNIT">
      <h3>SPEED DRONE UNIT</h3>
      <button onclick="transform(this)">ACTIVATE</button>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/300x200.png?text=URBAN+FIGHT+UNIT">
      <h3>URBAN FIGHT UNIT</h3>
      <button onclick="transform(this)">ACTIVATE</button>
    </div>

  </div>
</section>

<footer>
  SYSTEM ONLINE • CYBER CORE ACTIVE
</footer>

<script src="script.js"></script>
</body>
</html>
